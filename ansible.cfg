[defaults]
inventory = ./inventories/prod/hosts.yml
roles_path = ./roles
# NOTE:
# - 本项目默认使用 ansible-core（例如 docker-compose 测试镜像里安装的是 ansible-core）。
# - ansible-core 环境下并不一定自带 `yaml` stdout callback 插件，强制设置会导致：
#   "ERROR! Invalid callback for stdout specified: yaml"
# 如需 YAML 输出，可自行安装完整 ansible 包或额外安装对应 callback 插件，
# 并通过环境变量覆盖：ANSIBLE_STDOUT_CALLBACK=yaml
collections_path = ./collections
stdout_callback = default
bin_ansible_callbacks = True
host_key_checking = False
retry_files_enabled = False
forks = 20
timeout = 30

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False
