all:
  vars:
    ansible_user: ansible
    ansible_password: ansible
    ansible_become: true
    ansible_become_method: sudo
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  children:
    etcd:
      hosts:
        etcd1:
          # 在部分 docker/compose 环境中，service hostname 可能无法被正常解析；
          # container_name 在同一 network 内通常更稳定可解析。
          ansible_host: solo-etcd1
        etcd2:
          ansible_host: solo-etcd2
        etcd3:
          ansible_host: solo-etcd3
