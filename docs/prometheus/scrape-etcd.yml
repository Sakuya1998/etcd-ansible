scrape_configs:
  - job_name: "etcd"
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets:
          # 建议抓取独立 metrics 端口（默认为 2381）
          - "10.0.0.11:2381"
          - "10.0.0.12:2381"
          - "10.0.0.13:2381"
    tls_config:
      ca_file: /etc/prometheus/etcd/ca.crt
      cert_file: /etc/prometheus/etcd/client.crt
      key_file: /etc/prometheus/etcd/client.key
      insecure_skip_verify: false

