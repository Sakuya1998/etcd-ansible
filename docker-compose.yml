services:
  ansible:
    build:
      context: .
      dockerfile: docker/ansible/Dockerfile
    container_name: solo-ansible
    working_dir: /repo
    volumes:
      - ./:/repo
    networks:
      - etcdnet
    command: ["bash", "-lc", "sleep infinity"]

  etcd1:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: solo-etcd1
    hostname: etcd1
    privileged: true
    cgroupns_mode: host
    environment:
      - container=docker
      # 让 systemd 日志输出到容器 console，便于 `docker logs` 排障
      - SYSTEMD_LOG_LEVEL=debug
      - SYSTEMD_LOG_TARGET=console
      - SYSTEMD_LOG_COLOR=no
    tmpfs:
      - /run
      - /run/lock
    volumes:
      # systemd in container: need writable cgroup fs on some hosts (esp. cgroup v2)
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - etcd1-data:/data
    networks:
      etcdnet:
        aliases:
          - etcd1
    command: ["/sbin/init","--log-level=debug","--log-target=console","--log-color=no"]

  etcd2:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: solo-etcd2
    hostname: etcd2
    privileged: true
    cgroupns_mode: host
    environment:
      - container=docker
      - SYSTEMD_LOG_LEVEL=debug
      - SYSTEMD_LOG_TARGET=console
      - SYSTEMD_LOG_COLOR=no
    tmpfs:
      - /run
      - /run/lock
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - etcd2-data:/data
    networks:
      etcdnet:
        aliases:
          - etcd2
    command: ["/sbin/init","--log-level=debug","--log-target=console","--log-color=no"]

  etcd3:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: solo-etcd3
    hostname: etcd3
    privileged: true
    cgroupns_mode: host
    environment:
      - container=docker
      - SYSTEMD_LOG_LEVEL=debug
      - SYSTEMD_LOG_TARGET=console
      - SYSTEMD_LOG_COLOR=no
    tmpfs:
      - /run
      - /run/lock
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - etcd3-data:/data
    networks:
      etcdnet:
        aliases:
          - etcd3
    command: ["/sbin/init","--log-level=debug","--log-target=console","--log-color=no"]

networks:
  etcdnet:
    driver: bridge

volumes:
  etcd1-data:
  etcd2-data:
  etcd3-data:
